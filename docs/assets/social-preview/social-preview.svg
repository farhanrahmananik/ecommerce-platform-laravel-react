<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="'Segoe UI', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#11162a"/>
      <stop offset="100%" stop-color="#161d33"/>
    </linearGradient>

    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff5c35" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ff5c35" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5c6ee5" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#5c6ee5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="barOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a63"/>
      <stop offset="100%" stop-color="#ff5c35"/>
    </linearGradient>

    <linearGradient id="barIndigo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b98ef"/>
      <stop offset="100%" stop-color="#5c6ee5"/>
    </linearGradient>

    <linearGradient id="titleAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8a63"/>
      <stop offset="100%" stop-color="#ff5c35"/>
    </linearGradient>

    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dotGrid)"/>
  <circle cx="1180" cy="40" r="320" fill="url(#glowOrange)"/>
  <circle cx="40" cy="640" r="340" fill="url(#glowIndigo)"/>

  <!-- Kicker -->
  <g>
    <rect x="80" y="62" width="252" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="100" cy="79" r="4" fill="#3ddc97"/>
    <text x="114" y="84" font-size="13" font-weight="700" letter-spacing="1.4" fill="#c9d1e2">PORTFOLIO PROJECT &#183; TESTED</text>
  </g>

  <!-- Title -->
  <text x="78" y="210" font-size="72" font-weight="800" letter-spacing="-1.5" fill="#f5f7fb">E-Commerce Platform</text>

  <!-- Subtitle -->
  <text x="80" y="256" font-size="29" font-weight="700" fill="url(#titleAccent)">Laravel 12 API + React SPA</text>

  <!-- Tech stack line -->
  <text x="80" y="290" font-size="14" font-weight="700" letter-spacing="2" fill="#7b869c">LARAVEL 12 &#183; REACT 19 &#183; SANCTUM AUTH &#183; MYSQL</text>

  <!-- Value line -->
  <text x="80" y="336" font-size="20" font-weight="500" fill="#aab3c5">Production-style full-stack e-commerce</text>
  <text x="80" y="362" font-size="20" font-weight="500" fill="#aab3c5">portfolio project</text>

  <!-- Feature badges row 1 -->
  <g font-size="15" font-weight="700" fill="#e7ebf5">
    <g>
      <rect x="80" y="410" width="152" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="156" y="435" text-anchor="middle">Admin Dashboard</text>
    </g>
    <g>
      <rect x="246" y="410" width="112" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="302" y="435" text-anchor="middle">Storefront</text>
    </g>
    <g>
      <rect x="372" y="410" width="64" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="404" y="435" text-anchor="middle">Cart</text>
    </g>
    <g>
      <rect x="450" y="410" width="96" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="498" y="435" text-anchor="middle">Checkout</text>
    </g>
    <g>
      <rect x="560" y="410" width="80" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="600" y="435" text-anchor="middle">Orders</text>
    </g>
  </g>

  <!-- Feature badges row 2 -->
  <g font-size="15" font-weight="700" fill="#e7ebf5">
    <g>
      <rect x="80" y="464" width="72" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="116" y="489" text-anchor="middle">Stock</text>
    </g>
    <g>
      <rect x="166" y="464" width="88" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="210" y="489" text-anchor="middle">Coupons</text>
    </g>
    <g>
      <rect x="268" y="464" width="88" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="312" y="489" text-anchor="middle">Reports</text>
    </g>
    <g>
      <rect x="370" y="464" width="112" height="40" rx="20" fill="#ffffff" fill-opacity="0.055" stroke="#ffffff" stroke-opacity="0.10"/>
      <text x="426" y="489" text-anchor="middle">Audit Logs</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="80" y="560" font-size="15" font-weight="600" fill="#7b869c">Portfolio Project by Md Farhan Rahman</text>
  <text x="1200" y="560" font-size="14" font-weight="600" fill="#5c6684" text-anchor="end">github.com/farhanrahmananik/ecommerce-platform-laravel-react</text>

  <!-- Abstract dashboard motif panel -->
  <g>
    <rect x="740" y="130" width="440" height="380" rx="24" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.10"/>

    <!-- window header -->
    <circle cx="770" cy="156" r="6" fill="#ff8a63" fill-opacity="0.8"/>
    <circle cx="792" cy="156" r="6" fill="#ffd166" fill-opacity="0.8"/>
    <circle cx="814" cy="156" r="6" fill="#3ddc97" fill-opacity="0.8"/>
    <line x1="740" y1="182" x2="1180" y2="182" stroke="#ffffff" stroke-opacity="0.08"/>

    <!-- stat chips -->
    <g>
      <rect x="766" y="206" width="185" height="66" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="790" cy="232" r="4.5" fill="#3ddc97"/>
      <text x="804" y="237" font-size="12" font-weight="700" letter-spacing="0.6" fill="#9aa5b8">REVENUE</text>
      <text x="790" y="262" font-size="21" font-weight="800" fill="#eef1f8">+24%</text>
    </g>
    <g>
      <rect x="967" y="206" width="185" height="66" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
      <circle cx="991" cy="232" r="4.5" fill="#8b98ef"/>
      <text x="1005" y="237" font-size="12" font-weight="700" letter-spacing="0.6" fill="#9aa5b8">ORDERS</text>
      <text x="991" y="262" font-size="21" font-weight="800" fill="#eef1f8">+18%</text>
    </g>

    <!-- mini bar chart -->
    <g>
      <rect x="766" y="370" width="40" height="90" rx="8" fill="url(#barOrange)"/>
      <rect x="832" y="320" width="40" height="140" rx="8" fill="url(#barIndigo)"/>
      <rect x="898" y="350" width="40" height="110" rx="8" fill="url(#barOrange)" fill-opacity="0.85"/>
      <rect x="964" y="300" width="40" height="160" rx="8" fill="url(#barIndigo)" fill-opacity="0.9"/>
      <rect x="1030" y="340" width="40" height="120" rx="8" fill="url(#barOrange)" fill-opacity="0.7"/>
      <line x1="766" y1="460" x2="1080" y2="460" stroke="#ffffff" stroke-opacity="0.12"/>
    </g>
  </g>
</svg>
